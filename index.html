<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zevrae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fdfbf7;
        --text-primary: #2c2c2c;
        --text-secondary: #5c5c5c;
        --accent: #c5a059;
        --btn-bg: #2c2c2c;
        --btn-text: #fdfbf7;
        --btn-hover-bg: #c5a059;
        --btn-hover-text: #ffffff;
        --border-subtle: #e5e0d8;
        --card-bg: #ffffff;
      }

      html[data-theme="dark"] {
        --bg: #17140f;
        --text-primary: #f3efe7;
        --text-secondary: #b9b2a4;
        --accent: #d8b876;
        --btn-bg: #f3efe7;
        --btn-text: #17140f;
        --btn-hover-bg: #d8b876;
        --btn-hover-text: #17140f;
        --border-subtle: #332e24;
        --card-bg: #221e17;
      }

      html {
        transition: background-color 0.4s ease;
      }
      body {
        transition: background-color 0.4s ease;
      }

      * {
        box-sizing: border-box;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
      }

      body {
        display: flex;
        justify-content: center;
        padding: 64px 20px 48px;
      }

      /* subtle textile-weave backdrop, evokes a linen ground without being loud */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(var(--border-subtle) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
        background-size: 56px 56px;
        opacity: 0.35;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ---------- Logo ---------- */
      .logo-frame {
        width: 132px;
        height: 132px;
        border-radius: 50%;
        border: 1px solid var(--accent);
        padding: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        opacity: 0;
        transform: scale(0.82);
        animation: logoIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        position: relative;
      }

      .logo-frame::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 148px;
        height: 148px;
        border-radius: 50%;
        border: 1px solid var(--accent);
        opacity: 0.35;
      }

      .logo-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--card-bg);
        transition: background-color 0.4s ease;
      }

      .logo-inner img {
        width: 78%;
        height: 78%;
        object-fit: contain;
      }

      @keyframes logoIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ---------- Title / description ---------- */
      .title {
        margin: 26px 0 0;
        font-family: "Playfair Display", serif;
        font-weight: 600;
        font-size: 30px;
        letter-spacing: 0.14em;
        text-align: center;
        color: var(--text-primary);
        opacity: 0;
        animation: fadeIn 0.8s ease-out 0.55s forwards;
      }

      .rule {
        width: 36px;
        height: 1px;
        background: var(--accent);
        margin: 14px 0;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 0.7s forwards;
      }

      .description {
        margin: 0 0 8px;
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 15px;
        line-height: 1.65;
        text-align: center;
        color: var(--text-secondary);
        max-width: 340px;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 0.85s forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---------- Links ---------- */
      .links {
        width: 100%;
        margin-top: 34px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .link-btn {
        --delay: 0s;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px 20px;
        border-radius: 6px;
        background: var(--btn-bg);
        color: var(--btn-text);
        text-decoration: none;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--btn-bg);
        cursor: pointer;
        overflow: hidden;
        opacity: 0;
        transform: translateY(18px);
        animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: var(--delay);
        transition:
          background-color 0.4s ease,
          color 0.4s ease,
          border-color 0.4s ease,
          transform 0.25s ease;
      }

      .link-btn:nth-child(1) {
        --delay: 1.05s;
      }
      .link-btn:nth-child(2) {
        --delay: 1.2s;
      }
      .link-btn:nth-child(3) {
        --delay: 1.35s;
      }
      .link-btn:nth-child(4) {
        --delay: 1.5s;
      }
      .link-btn:nth-child(5) {
        --delay: 1.65s;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .link-btn:hover,
      .link-btn:focus-visible {
        background: var(--btn-hover-bg);
        border-color: var(--btn-hover-bg);
        color: var(--btn-hover-text);
        transform: translateY(-2px);
      }

      .link-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .link-btn:active {
        transform: translateY(0);
      }

      .icon {
        width: 17px;
        height: 17px;
        flex-shrink: 0;
        stroke: currentColor;
        fill: none;
      }

      .icon.fill {
        fill: currentColor;
        stroke: none;
      }

      /* ---------- Footer ---------- */
      .footer {
        margin-top: 44px;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-secondary);
        opacity: 0;
        animation: fadeIn 0.8s ease-out 1.6s forwards;
      }

      .footer span {
        color: var(--accent);
      }

      /* ---------- Theme toggle ---------- */
      .theme-toggle {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--card-bg);
        border: 1px solid var(--border-subtle);
        border-radius: 999px;
        padding: 5px;
        opacity: 0;
        animation: fadeIn 0.7s ease-out 0.15s forwards;
        transition:
          background-color 0.4s ease,
          border-color 0.4s ease;
      }

      .theme-toggle button {
        width: 30px;
        height: 30px;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .theme-toggle button svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .theme-toggle button.active {
        background: var(--accent);
        color: var(--btn-hover-text);
      }

      html[data-theme="dark"] .theme-toggle button.active {
        color: var(--btn-hover-text);
      }

      .theme-toggle button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      /* ---------- New badge (starter animation for afternow.com link) ---------- */
      .link-btn .badge {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 9px;
        letter-spacing: 0.1em;
        font-weight: 600;
        padding: 3px 7px;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        text-transform: uppercase;
        animation: badgePulse 2.2s ease-in-out infinite;
        animation-delay: 1.9s;
      }

      @keyframes badgePulse {
        0%,
        100% {
          transform: translateY(-50%) scale(1);
          opacity: 1;
        }
        50% {
          transform: translateY(-50%) scale(1.12);
          opacity: 0.75;
        }
      }

      /* ---------- Contact text row (fixed alignment) ---------- */
      .contact-note {
        margin-top: 18px;
        font-size: 11px;
        color: var(--text-secondary);
        opacity: 0;
        animation: fadeIn 0.8s ease-out 1.75s forwards;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        line-height: 1;
      }

      .contact-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        line-height: 1;
      }

      .contact-note .icon {
        width: 13px;
        height: 13px;
        flex-shrink: 0;
        display: block;
      }

      .contact-note a {
        color: inherit;
        text-decoration: none;
        line-height: 1;
      }

      .contact-note a:hover {
        color: var(--accent);
      }

      .contact-note .dot {
        color: var(--accent);
        line-height: 1;
      }
    </style>
  </head>

    <script>
      (function () {
        var root = document.documentElement;
        var btnLight = document.getElementById("btn-light");
        var btnDark = document.getElementById("btn-dark");

        function setTheme(theme) {
          if (theme === "dark") {
            root.setAttribute("data-theme", "dark");
            btnDark.classList.add("active");
            btnLight.classList.remove("active");
            btnDark.setAttribute("aria-pressed", "true");
            btnLight.setAttribute("aria-pressed", "false");
          } else {
            root.removeAttribute("data-theme");
            btnLight.classList.add("active");
            btnDark.classList.remove("active");
            btnLight.setAttribute("aria-pressed", "true");
            btnDark.setAttribute("aria-pressed", "false");
          }
        }

        // Respect system preference on first load
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        setTheme(prefersDark ? "dark" : "light");

        btnLight.addEventListener("click", function () {
          setTheme("light");
        });
        btnDark.addEventListener("click", function () {
          setTheme("dark");
        });
      })();
    </script>
